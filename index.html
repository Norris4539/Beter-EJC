      const [rSrch,setRSrch]   = useState("");
      const [rDateFrom,setRDateFrom] = useState("");
      const [rDateTo,setRDateTo]     = useState("");
      const [lightboxSrc,setLightboxSrc] = useState(null);
      const [editingTemplate,setEditingTemplate] = useState(null);
      const [tplEditForm,setTplEditForm] = useState({});
      const [newAssignee,setNewAssignee] = useState("");
      const [newAssEmail,setNewAssEmail] = useState("");
      const [newAssPw,setNewAssPw]       = useState("");
      const [newAssErr,setNewAssErr]     = useState({});
      const [editAss,setEditAss]         = useState(null);
      const [editAssVal,setEditAssVal]   = useState("");
      const [editUserId,setEditUserId]   = useState(null);
      const [editUserName,setEditUserName] = useState("");

      const setJobs = u => setJobsRaw(p=>{ const n=typeof u==="function"?u(p):u; save("jc-jobs",n); return n; });
      const setDark = v => { const d=typeof v==="function"?v(dark):v; setDarkRaw(d); save("jc-dark",d); };

      useEffect(()=>{
        const oi=()=>setOffline(false), oo=()=>setOffline(true);
        const bi=e=>{e.preventDefault();setDeferredPrompt(e);setShowInstall(true);};
        window.addEventListener("online",oi); window.addEventListener("offline",oo);
        window.addEventListener("beforeinstallprompt",bi);
        return()=>{window.removeEventListener("online",oi);window.removeEventListener("offline",oo);window.removeEventListener("beforeinstallprompt",bi);};
      },[]);

      const triggerInstall = async()=>{
        if(!deferredPrompt)return;
        deferredPrompt.prompt();
        const{outcome}=await deferredPrompt.userChoice;
        if(outcome==="accepted")setShowInstall(false);
      };

      useEffect(()=>{ if(!toast)return; const t=setTimeout(()=>setToast(null),3200); return()=>clearTimeout(t); },[toast]);
      useEffect(()=>{ if(tab==="calendar"&&calScrollRef.current) calScrollRef.current.scrollTop=90; },[tab,calView]);
      const notify=(msg,type="ok")=>setToast({msg,type});
      const selJob=jobs.find(j=>j.id===selId)||null;

      const list=jobs
        .filter(j=>fSt==="All"||j.status===fSt)
        .filter(j=>fPr==="All"||j.priority===fPr)
        .filter(j=>{ if(!srch)return true; const q=srch.toLowerCase(); return j.title.toLowerCase().includes(q)||j.assignee.toLowerCase().includes(q)||j.category.toLowerCase().includes(q); })
        .sort((a,b)=>{
          if(sort==="due")return new Date(a.due)-new Date(b.due);
          if(sort==="oldest")return new Date(a.created)-new Date(b.created);
          return new Date(b.created)-new Date(a.created);
        });

      const cnts={Outstanding:jobs.filter(j=>j.status==="Outstanding").length,"In Progress":jobs.filter(j=>j.status==="In Progress").length,"On Hold":jobs.filter(j=>j.status==="On Hold").length};

      const calJobs=jobs.filter(j=>fSt==="All"||j.status===fSt).filter(j=>fPr==="All"||j.priority===fPr).filter(j=>{if(!srch)return true;const q=srch.toLowerCase();return j.title.toLowerCase().includes(q)||j.assignee.toLowerCase().includes(q)||j.category.toLowerCase().includes(q);}).filter(j=>{if(calMode==="individual"&&calAssigneeFilter!=="All")return j.assignee===calAssigneeFilter;if(calMode==="team")return teamAssignees.includes(j.assignee);return true;});
      const ds=d=>{const dt=new Date(d);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;};
      const wkStart=d=>{const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt;};
      const wkDays=d=>Array.from({length:7},(_,i)=>{const dt=new Date(wkStart(d));dt.setDate(dt.getDate()+i);return dt;});
      const isToday=d=>ds(d)===ds(new Date());
      const CAL_HS=7,CAL_HE=20,CAL_SH=60;
      const CAL_HOURS=Array.from({length:CAL_HE-CAL_HS},(_,i)=>CAL_HS+i);
      const CAL_EVT=(9-CAL_HS)*CAL_SH;

      const [formOrigin,setFormOrigin] = useState("home");
      const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
      const openAdd=()=>{setForm({invoiceNo:"",title:"",category:cats[0]||"Maintenance",priority:"Medium",status:"Outstanding",assignee:assignees[0]||"",location:locations[0]||"",due:"",scheduledTime:"",description:"",recipientEmail:"",contact:{name:"",phone:"",email:""}});setErrs({});setEdit(false);setFormOrigin("home");setView("form");};
      const openEdit=j=>{setForm({...j});setErrs({});setEdit(true);setFormOrigin("home");setView("form");};
      const openCalAdd=(day,hour,assigneeOverride)=>{const due=ds(day);const scheduledTime=`${String(hour).padStart(2,"0")}:00`;const defaultAssignee=assigneeOverride||(calMode==="individual"&&calAssigneeFilter!=="All"?calAssigneeFilter:assignees[0]||"");setForm({invoiceNo:"",title:"",category:cats[0]||"Maintenance",priority:"Medium",status:"Outstanding",assignee:defaultAssignee,location:locations[0]||"",due,scheduledTime,description:"",recipientEmail:"",contact:{name:"",phone:"",email:""}});setErrs({});setEdit(false);setFormOrigin("calendar");setView("form");};

      const validate=()=>{
        const e={};
        if(!form.title?.trim())e.title="Title required";
        if(!form.assignee?.trim())e.assignee="Assignee required";
        if(!form.location?.trim())e.location="Location required";
        if(!form.due)e.due="Due date required";
        setErrs(e); return Object.keys(e).length===0;
      };

      const submitForm=()=>{
        if(!validate())return;
        if(edit){setJobs(js=>js.map(j=>j.id===form.id?{...form}:j));setSelId(form.id);setView("detail");notify("Changes saved");}
        else{const nj={...form,id:uid.current++,created:today()};save("jc-uid",uid.current);setJobs(js=>[nj,...js]);if(formOrigin==="calendar"){setTab("calendar");setView("home");}else setView("home");notify("Jobcard created");if(form.assignee&&form.assignee!=="Unassigned")pushNotify("New Work Order Assigned",`${form.title} → ${form.assignee}`);}
      };

      const doDelete=()=>{setJobs(js=>js.filter(j=>j.id!==selId));setDelModal(false);setSelId(null);setView("home");notify("Deleted","err");};

      const changeStatus=(job,status)=>{
        if(status==="Completed"){
          const base=job.inProgressAt?new Date(job.inProgressAt):new Date();
          const hh=String(base.getHours()).padStart(2,"0"),mm=String(base.getMinutes()).padStart(2,"0");
          setCForm({arrivedAt:`${hh}:${mm}`,metWith:"",clientContact:"",workCompleted:[""],workRemaining:[""],additionalNotes:"",signatureDataUrl:null,photos:[]});
          setCErrs({}); setCTpl(null); setCModal({job});
        } else {
          const updated={...job,status,...(status==="In Progress"&&!job.inProgressAt?{inProgressAt:new Date().toISOString()}:{})};
          setJobs(js=>js.map(j=>j.id===job.id?updated:j)); notify(`Status updated to ${status}`);
        }
      };

      const sendEmail = async(job, doc) => {
        if(!emailCfg.endpointUrl||!job.recipientEmail) return;
        const pdfBase64 = doc.output("datauristring");
        const filename = `JC-${String(job.id).padStart(4,"0")}-completion.pdf`;
        try {
          const res = await fetch(emailCfg.endpointUrl, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({to:job.recipientEmail,subject:`Completion Report: ${job.title}`,senderName:emailCfg.senderName||"JobFlow",pdfBase64,filename,jobId:job.id,jobTitle:job.title,smtpHost:emailCfg.host,smtpPort:parseInt(emailCfg.port)||587,smtpSecure:emailCfg.secure||false,smtpUser:emailCfg.smtpUser,smtpPass:emailCfg.smtpPass})
          });
          const data = await res.json();
          if(data.success) notify(`Report emailed to ${job.recipientEmail}`);
          else notify("Email failed — PDF saved locally","err");
        } catch { notify("Email failed — PDF saved locally","err"); }
      };

      const submitComplete=()=>{
        if(!cModal)return;
        if(cTpl==="site-visit"){
          const e={};
          if(!cForm.metWith?.trim())e.metWith="Required";
          if(!cForm.clientContact?.trim())e.clientContact="Required";
          if(!cForm.workCompleted.some(l=>l.trim()))e.workCompleted="At least one item required";
          if(!cForm.workRemaining.some(l=>l.trim()))e.workRemaining="At least one item required";
          if(Object.keys(e).length){setCErrs(e);return;}
        }
        setCErrs({});
        const{job}=cModal;
        const now=new Date().toISOString();
        const rpt=cTpl==="site-visit"?{templateType:"site-visit",arrivedAt:cForm.arrivedAt,metWith:cForm.metWith,clientContact:cForm.clientContact,workCompleted:cForm.workCompleted.filter(l=>l.trim()),workRemaining:cForm.workRemaining.filter(l=>l.trim()),additionalNotes:cForm.additionalNotes?.trim()||null,signatureDataUrl:cForm.signatureDataUrl||null}:null;
        const completed={...job,status:"Completed",completedAt:now,completionReport:rpt};
        if((cForm.photos||[]).length>0) save(`jc-photos-${job.id}`,cForm.photos);
        setJobs(js=>js.map(j=>j.id===job.id?completed:j));
        const pdfDoc=generatePDF(completed,rpt);
        setCModal(null); setCTpl(null); notify("Jobcard complete — PDF saved");
        sendEmail(completed,pdfDoc);
      };

      const pushNotify = async(title,body)=>{
        try{
          if(!("Notification" in window))return;
          if(Notification.permission==="granted"){
            const reg=await navigator.serviceWorker.ready;
            reg.showNotification(title,{body,tag:"jc-assign",renotify:true,icon:""});
          }
        }catch(e){}
      };
      const requestNotifPerm = async()=>{
        if("Notification" in window && Notification.permission==="default"){
          await Notification.requestPermission();
        }
      };

      const handleSignIn = async(em,pw)=>{
        const h=await hashPw(pw,em);
        const u=users.find(u=>u.email.toLowerCase()===em.toLowerCase()&&u.pwHash===h);
        if(!u)return "Invalid email or password";
        setSession({userId:u.id,email:u.email,name:u.name,isAdmin:u.isAdmin||false});
        requestNotifPerm();
        return null;
      };
      const handleRegister = async(em,nm,pw)=>{
        if(users.some(u=>u.email.toLowerCase()===em.toLowerCase()))return "Email already in use";
        const h=await hashPw(pw,em);
        const isAdmin=users.length===0;
        const nu={id:Date.now(),email:em,name:nm,pwHash:h,isAdmin};
        setUsersStore([...users,nu]);
        setSession({userId:nu.id,email:nu.email,name:nu.name,isAdmin});
        requestNotifPerm();
        return null;
      };
      const handleSignOut=()=>setSession(null);

      const ModeToggle=()=>(
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div className="ws-toggle-track" onClick={()=>setDark(d=>!d)} role="switch" aria-checked={dark} tabIndex={0} onKeyDown={e=>e.key===" "&&setDark(d=>!d)}>
            <div className={`ws-toggle-knob${dark?" on":""}`}/>
          </div>
          <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.14em",color:"var(--text-dim)",textTransform:"uppercase"}}>{dark?"Dark":"Light"}</span>
        </div>
      );

      const TabNav=()=>(
        <div className="tab-bar">
          <button className={`tab-btn${tab==="list"?" active":""}`} onClick={()=>{setTab("list");setView("home");}}>LIST</button>
          <button className={`tab-btn${tab==="calendar"?" active":""}`} onClick={()=>setTab("calendar")}>CALENDAR</button>
          <button className={`tab-btn${tab==="reports"?" active":""}`} onClick={()=>setTab("reports")}>REPORTS</button>
          <button className={`tab-btn${tab==="settings"?" active":""}`} onClick={()=>setTab("settings")}>ACCOUNT</button>
        </div>
      );

      const CalendarView=()=>{
        const days=calView==="week"?wkDays(calDate):[calDate];
        const cols=days.length;
        const now=new Date();
        const nowPx=(now.getHours()*60+now.getMinutes()-CAL_HS*60)*(CAL_SH/60);
        const showNow=now.getHours()>=CAL_HS&&now.getHours()<CAL_HE;
        const DAY_ABB=["MON","TUE","WED","THU","FRI","SAT","SUN"];
        const pLabel=calView==="day"
          ?calDate.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
          :(()=>{const dd=wkDays(calDate);const f=dd[0],l=dd[6];const ma=f.toLocaleDateString("en-GB",{month:"short"}),mb=l.toLocaleDateString("en-GB",{month:"short"});return ma===mb?`${ma} ${f.getDate()}–${l.getDate()}, ${f.getFullYear()}`:`${ma} ${f.getDate()} – ${mb} ${l.getDate()}, ${f.getFullYear()}`;})();
        const go=n=>{const d=new Date(calDate);d.setDate(d.getDate()+n*(calView==="week"?7:1));setCalDate(d);};
        const ASGN_COLORS=["#374a6a","#4e6846","#8b7228","#8b3a2a","#7a6e5e"];
        const aColor=name=>ASGN_COLORS[Math.max(0,assignees.indexOf(name))%ASGN_COLORS.length];
        const evH=52;
        const evTop=job=>{if(job.scheduledTime){const[h,m]=job.scheduledTime.split(":").map(Number);return(h+m/60-CAL_HS)*CAL_SH;}return CAL_EVT;};
        const EventEl=({job,hideAssigneeName=false})=>{
          const sc=SC[job.status];
          return(
            <div className="cal-event" style={{top:evTop(job),height:evH,background:sc.bg,border:`1px solid ${sc.border}`,color:sc.color,...(calMode==="team"?{borderLeft:`3px solid ${aColor(job.assignee)}`}:{})}}
              onClick={e=>{e.stopPropagation();setSelId(job.id);setTab("list");setView("detail");}}>
              <div className="cal-event-title">
                {calMode==="team"&&!hideAssigneeName&&<span style={{color:aColor(job.assignee),fontWeight:700,marginRight:3,fontSize:8}}>{job.assignee.split(" ")[0]}</span>}
                {job.scheduledTime&&<span style={{opacity:0.7,marginRight:4}}>{job.scheduledTime}</span>}
                {job.title}
              </div>
              {evH>=28&&<div className="cal-event-sub">{job.location}</div>}
            </div>
          );
        };
        const activeCols=calMode==="team"?(teamAssignees.length>0?teamAssignees:assignees.filter(a=>a!=="Unassigned")):null;
        return (
          <div className="cal-wrap">
            <div className="cal-toolbar">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",flexWrap:"wrap",gap:12}}>
                <div className="cal-nav">
                  <button className="cal-nav-btn" onClick={()=>go(-1)}>‹ Prev</button>
                  <button className="cal-nav-btn" onClick={()=>setCalDate(new Date())}>Today</button>
                  <button className="cal-nav-btn" onClick={()=>go(1)}>Next ›</button>
                </div>
                <span className="cal-period">{pLabel}</span>
                <div className="cal-view-toggle">
                  <button className={`cal-view-btn${calView==="week"?" active":""}`} onClick={()=>setCalView("week")}>WEEK</button>
                  <button className={`cal-view-btn${calView==="day"?" active":""}`} onClick={()=>setCalView("day")}>DAY</button>
                </div>
              </div>
            </div>
            {calMode==="team"&&calView==="day"&&activeCols&&activeCols.length>0?(
              <div className="cal-grid-outer">
                <div style={{display:"grid",gridTemplateColumns:`44px repeat(${activeCols.length},1fr)`,borderBottom:"1px solid var(--card-border)"}}>
                  <div/>
                  {activeCols.map(a=>(
                    <div key={a} className="cal-day-hdr">
                      <span className="cal-day-name">{a.split(" ")[0].toUpperCase()}</span>
                      <span style={{width:8,height:8,borderRadius:"50%",background:aColor(a),display:"inline-block",marginTop:2}}/>
                    </div>
                  ))}
                </div>
                <div className="cal-scroll" ref={calScrollRef}>
                  <div style={{display:"flex"}}>
                    <div style={{width:44,flexShrink:0}}>
                      {CAL_HOURS.map(h=><div key={h} className="cal-time-cell"><span className="cal-time-lbl">{h}:00</span></div>)}
                    </div>
                    {activeCols.map((aName,ci)=>{
                      const assigneeJobs=calJobs.filter(j=>j.assignee===aName&&j.due===ds(calDate));
                      return(
                        <div key={ci} style={{flex:1,position:"relative",borderLeft:"1px solid var(--card-border)"}}>
                          {CAL_HOURS.map(h=><div key={h} className="cal-slot" onClick={()=>openCalAdd(calDate,h,aName)}><div className="cal-slot-half"/></div>)}
                          {assigneeJobs.map(job=><EventEl key={job.id} job={job} hideAssigneeName={true}/>)}
                          {isToday(calDate)&&showNow&&<div className="cal-now-line" style={{top:nowPx}}><div className="cal-now-dot"/></div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            ):(
              <div className="cal-grid-outer">
                <div style={{display:"grid",gridTemplateColumns:`44px repeat(${cols},1fr)`,borderBottom:"1px solid var(--card-border)"}}>
                  <div/>
                  {days.map((d,i)=>(
                    <div key={i} className={`cal-day-hdr${isToday(d)?" today":""}`}>
                      <span className="cal-day-name">{calView==="week"?DAY_ABB[i]:d.toLocaleDateString("en-GB",{weekday:"short"}).toUpperCase()}</span>
                      <span className={`cal-day-num${isToday(d)?" today-num":""}`}>{d.getDate()}</span>
                    </div>
                  ))}
                </div>
                <div className="cal-scroll" ref={calScrollRef}>
                  <div style={{display:"flex"}}>
                    <div style={{width:44,flexShrink:0}}>
                      {CAL_HOURS.map(h=><div key={h} className="cal-time-cell"><span className="cal-time-lbl">{h}:00</span></div>)}
                    </div>
                    {days.map((d,di)=>{
                      const dStr=ds(d); const dayJobs=calJobs.filter(j=>j.due===dStr);
                      return(
                        <div key={di} style={{flex:1,position:"relative",borderLeft:"1px solid var(--card-border)"}}>
                          {CAL_HOURS.map(h=><div key={h} className="cal-slot" onClick={()=>openCalAdd(d,h)}><div className="cal-slot-half"/></div>)}
                          {dayJobs.map(job=><EventEl key={job.id} job={job}/>)}
                          {isToday(d)&&showNow&&<div className="cal-now-line" style={{top:nowPx}}><div className="cal-now-dot"/></div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const pg={dark,offline,toast,showInstall,onInstall:triggerInstall,onDismissInstall:()=>setShowInstall(false)};
      const cm={cModal,cTpl,cForm,setCModal,setCTpl,setCForm,cErrs,setCErrs,submitComplete,templates,setTemplates,notify,setEditingTemplate};

      if(!session) return <SignIn users={users} onSignIn={handleSignIn} onRegister={handleRegister}/>;

      /* CALENDAR */
      if(tab==="calendar"&&view!=="form") return (
        <Page {...pg}>
          <CModal {...cm}/>
          <TabNav/>
          <CalendarView/>
        </Page>
      );

      /* SETTINGS */
      if(tab==="settings") return (
        <Page {...pg}>
          <TabNav/>
          <div style={{maxWidth:520}}>
            {/* Sub-tab bar */}
            <div className="sub-tab-bar" style={{marginBottom:24}}>
              <button className={`sub-tab-btn${acctTab==="account"?" active":""}`} onClick={()=>setAcctTab("account")}>Account</button>
              {session.isAdmin&&<button className={`sub-tab-btn${acctTab==="admin"?" active":""}`} onClick={()=>setAcctTab("admin")}>Admin</button>}
              <button className={`sub-tab-btn${acctTab==="settings"?" active":""}`} onClick={()=>setAcctTab("settings")}>Settings</button>
            </div>

            {/* ── ACCOUNT sub-tab ─────────────────────────── */}
            {acctTab==="account"&&(<>
              <div className="ws-card" style={{padding:"24px 28px",borderRadius:2,marginBottom:16}}>
                <SL s={0}>Profile</SL>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div><FL c="Name"/><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:15,color:"var(--text-pri)",fontWeight:400}}>{session.name}</div></div>
                  <div><FL c="Email"/><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-sec)",fontWeight:300}}>{session.email}</div></div>
                  {session.isAdmin&&(<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:1,background:"rgba(55,74,106,0.08)",border:"1px solid rgba(55,74,106,0.25)",alignSelf:"flex-start"}}><span style={{width:5,height:5,borderRadius:"50%",background:"var(--indigo)",display:"inline-block"}}/><span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,color:"var(--indigo)",letterSpacing:"0.12em",fontWeight:500}}>ADMINISTRATOR</span></div>)}
                </div>
              </div>
              <BrushStroke variant={0} style={{margin:"8px 0 24px"}}/>
              <button className="ws-btn-danger" onClick={handleSignOut} style={{letterSpacing:"0.12em"}}>Sign out</button>
            </>)}

            {/* ── ADMIN sub-tab ────────────────────────────── */}
            {acctTab==="admin"&&session.isAdmin&&(<>

              {/* Registered Users */}
              <div className="ws-card" style={{padding:"24px 28px",borderRadius:2,marginBottom:16}}>
                <SL s={2}>Registered Users</SL>
                <div style={{display:"flex",flexDirection:"column"}}>
                  {users.map((u,i)=>(
                    <div key={u.id} className="user-admin-row" style={{borderBottom:i<users.length-1?"1px solid var(--card-border)":"none"}}>
                      <div style={{flex:1,minWidth:0}}>
                        {editUserId===u.id?(
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            <input className="ws-input" style={{flex:1,padding:"6px 10px",fontSize:13}} value={editUserName} onChange={e=>setEditUserName(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter"){setUsersStore(users.map(x=>x.id===u.id?{...x,name:editUserName.trim()||x.name}:x));setEditUserId(null);notify("User updated");}if(e.key==="Escape")setEditUserId(null);}}/>
                            <button className="cs-item-action" onClick={()=>{setUsersStore(users.map(x=>x.id===u.id?{...x,name:editUserName.trim()||x.name}:x));setEditUserId(null);notify("User updated");}} style={{color:"var(--matcha)",opacity:1,fontSize:15}}>✓</button>
                            <button className="cs-item-action" onClick={()=>setEditUserId(null)} style={{opacity:1}}>✕</button>
                          </div>
                        ):(
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                            <span style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400}}>{u.name}</span>
                            {u.isAdmin&&<span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:8,color:"var(--indigo)",letterSpacing:"0.12em",fontWeight:500}}>ADMIN</span>}
                          </div>
                        )}
                        {editUserId!==u.id&&<div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,color:"var(--text-sec)",fontWeight:300}}>{u.email}</div>}
                      </div>
                      {editUserId!==u.id&&(
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          <button className="ws-btn-ghost" style={{padding:"5px 10px",fontSize:10}} onClick={()=>{setEditUserId(u.id);setEditUserName(u.name);}}>✎ Edit</button>
                          {u.id!==session.userId&&<button className="ws-btn-danger" style={{padding:"5px 10px",fontSize:10}} onClick={()=>{setUsersStore(users.filter(x=>x.id!==u.id));notify(`Removed ${u.name}`,"err");}}>Remove</button>}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {/* Assignee Management — adding an assignee also creates a user account */}
              <div className="ws-card" style={{padding:"24px 28px",borderRadius:2,marginBottom:16}}>
                <SL s={0}>Assignee Management</SL>
                <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,color:"var(--text-sec)",fontWeight:300,marginBottom:16}}>Adding an assignee creates a user account they can sign in with.</div>
                <div style={{display:"flex",flexDirection:"column"}}>
                  {assignees.map((a,i)=>{
                    const linkedUser=users.find(u=>u.name===a);
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:i<assignees.length-1?"1px solid var(--card-border)":"none"}}>
                        {editAss===i?(
                          <div style={{display:"flex",gap:8,alignItems:"center",flex:1}}>
                            <input className="ws-input" style={{flex:1,padding:"6px 10px",fontSize:13}} value={editAssVal} onChange={e=>setEditAssVal(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter"){const nxt=assignees.map((x,xi)=>xi===i?editAssVal.trim()||x:x);setAssignees(nxt);setEditAss(null);}if(e.key==="Escape")setEditAss(null);}}/>
                            <button className="cs-item-action" onClick={()=>{const nxt=assignees.map((x,xi)=>xi===i?editAssVal.trim()||x:x);setAssignees(nxt);setEditAss(null);}} style={{color:"var(--matcha)",opacity:1,fontSize:15}}>✓</button>
                            <button className="cs-item-action" onClick={()=>setEditAss(null)} style={{opacity:1}}>✕</button>
                          </div>
                        ):(
                          <div style={{display:"flex",flexDirection:"column",gap:2}}>
                            <span style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400}}>{a}</span>
                            {linkedUser&&<span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,color:"var(--text-dim)",letterSpacing:"0.06em"}}>{linkedUser.email}</span>}
                          </div>
                        )}
                        {editAss!==i&&(
                          <div style={{display:"flex",gap:6}}>
                            <button className="cs-item-action" style={{opacity:1,color:"var(--text-sec)",fontSize:13}} onClick={()=>{setEditAss(i);setEditAssVal(a);}}>✎</button>
                            <button className="cs-item-action del" style={{opacity:1,fontSize:13}} onClick={()=>{const nxt=assignees.filter((_,xi)=>xi!==i);setAssignees(nxt);}}>✕</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Add new assignee — 3 required fields */}
                <BrushStroke variant={0} style={{margin:"16px 0 14px"}}/>
                <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.14em",color:"var(--text-sec)",textTransform:"uppercase",marginBottom:12}}>Add New Assignee</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <FL c="Display Name *"/>
                    <input className="ws-input" placeholder="Full name…" value={newAssignee} onChange={e=>{setNewAssignee(e.target.value);setNewAssErr(x=>({...x,name:null}));}} style={{borderColor:newAssErr.name?"var(--aka)":undefined}}/>
                    {newAssErr.name&&<div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,color:"var(--aka)",marginTop:4}}>* {newAssErr.name}</div>}
                  </div>
                  <div>
                    <FL c="Work Email (login username) *"/>
                    <input type="email" className="ws-input" placeholder="name@company.com" value={newAssEmail} onChange={e=>{setNewAssEmail(e.target.value);setNewAssErr(x=>({...x,email:null}));}} style={{borderColor:newAssErr.email?"var(--aka)":undefined}}/>
                    {newAssErr.email&&<div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,color:"var(--aka)",marginTop:4}}>* {newAssErr.email}</div>}
                  </div>
                  <div>
                    <FL c="Password *"/>
                    <input type="password" className="ws-input" placeholder="••••••••" value={newAssPw} onChange={e=>{setNewAssPw(e.target.value);setNewAssErr(x=>({...x,pw:null}));}} style={{borderColor:newAssErr.pw?"var(--aka)":undefined}}/>
                    {newAssErr.pw&&<div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,color:"var(--aka)",marginTop:4}}>* {newAssErr.pw}</div>}
                  </div>
                  <button className="ws-btn-primary" style={{alignSelf:"flex-start",padding:"9px 20px",fontSize:11,letterSpacing:"0.12em",marginTop:4}} onClick={async()=>{
                    const errs={};
                    if(!newAssignee.trim()) errs.name="Name required";
                    if(!newAssEmail.trim()) errs.email="Email required";
                    else if(users.some(u=>u.email.toLowerCase()===newAssEmail.trim().toLowerCase())) errs.email="Email already in use";
                    if(!newAssPw.trim()||newAssPw.length<4) errs.pw="Password must be at least 4 characters";
                    if(Object.keys(errs).length){setNewAssErr(errs);return;}
                    const h=await hashPw(newAssPw,newAssEmail.trim());
                    const nu={id:Date.now(),email:newAssEmail.trim(),name:newAssignee.trim(),pwHash:h,isAdmin:false};
                    setUsersStore([...users,nu]);
                    setAssignees([...assignees,newAssignee.trim()]);
                    setNewAssignee("");setNewAssEmail("");setNewAssPw("");setNewAssErr({});
                    notify(`${newAssignee.trim()} added`);
                  }}>+ Add Assignee</button>
                </div>
              </div>
            </>)}

            {/* ── SETTINGS sub-tab ─────────────────────────── */}
            {acctTab==="settings"&&(<>
              <div className="ws-card" style={{padding:"24px 28px",borderRadius:2,marginBottom:16}}>
                <SL s={1}>Appearance</SL>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <ModeToggle/>
                  <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:12,color:"var(--text-sec)",fontWeight:300}}>{dark?"Dark mode":"Light mode"}</span>
                </div>
              </div>

              {session.isAdmin&&(
                <div className="ws-card" style={{padding:"24px 28px",borderRadius:2,marginBottom:16}}>
                  <SL s={1}>Email / SMTP</SL>
                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                    <FG label="Proxy Endpoint URL"><input className="ws-input" placeholder="https://….netlify.app/.netlify/functions/send-email" value={eCfg.endpointUrl||""} onChange={e=>setECfg(c=>({...c,endpointUrl:e.target.value}))}/></FG>
                    <FG label="Sender Display Name"><input className="ws-input" placeholder="JobFlow Notifications" value={eCfg.senderName||""} onChange={e=>setECfg(c=>({...c,senderName:e.target.value}))}/></FG>
                    <FG label="SMTP Provider">
                      <CustomSelect value={eCfg.provider||"Gmail"} onChange={v=>{const p=SMTP_PROVIDERS.find(x=>x.label===v);setECfg(c=>({...c,provider:v,...(p&&p.label!=="Custom"?{host:p.host,port:p.port,secure:p.secure}:{})}));}}
                        options={SMTP_PROVIDERS.map(p=>({value:p.label,label:p.label}))}/>
                    </FG>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 88px",gap:12}}>
                      <FG label="SMTP Host"><input className="ws-input" placeholder="smtp.gmail.com" value={eCfg.host||""} onChange={e=>setECfg(c=>({...c,host:e.target.value,provider:"Custom"}))}/></FG>
                      <FG label="Port"><input className="ws-input" placeholder="587" value={eCfg.port||""} onChange={e=>setECfg(c=>({...c,port:e.target.value,provider:"Custom"}))}/></FG>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div className="ws-toggle-track" onClick={()=>setECfg(c=>({...c,secure:!c.secure,port:!c.secure?"465":"587",provider:"Custom"}))} role="switch" aria-checked={eCfg.secure} tabIndex={0} onKeyDown={e=>e.key===" "&&setECfg(c=>({...c,secure:!c.secure,port:!c.secure?"465":"587",provider:"Custom"}))}>
                        <div className={`ws-toggle-knob${eCfg.secure?" on":""}`}/>
                      </div>
                      <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,color:"var(--text-sec)",fontWeight:300}}>{eCfg.secure?"SSL / TLS (port 465)":"STARTTLS (port 587)"}</span>
                    </div>
                    <FG label="SMTP Username"><input className="ws-input" placeholder="your@email.com" value={eCfg.smtpUser||""} onChange={e=>setECfg(c=>({...c,smtpUser:e.target.value}))}/></FG>
                    <FG label="SMTP Password / App Password"><input type="password" className="ws-input" placeholder="••••••••••••" value={eCfg.smtpPass||""} onChange={e=>setECfg(c=>({...c,smtpPass:e.target.value}))}/></FG>
                    <button className="ws-btn-primary" style={{alignSelf:"flex-start",fontSize:11,padding:"9px 20px",letterSpacing:"0.12em"}} onClick={()=>{setEmailCfg(eCfg);notify("Email settings saved");}}>Save</button>
                  </div>
                </div>
              )}
            </>)}
          </div>
        </Page>
      );

      /* REPORTS */
      if(tab==="reports"&&view!=="form") {
        const reportJobs=jobs.filter(j=>{
          if(j.status!=="Completed")return false;
          if(rFPr!=="All"&&j.priority!==rFPr)return false;
          if(rFAss!=="All"&&j.assignee!==rFAss)return false;
          if(rFCat!=="All"&&j.category!==rFCat)return false;
          if(rSrch){const q=rSrch.toLowerCase();if(!j.title.toLowerCase().includes(q)&&!j.assignee.toLowerCase().includes(q)&&!j.category.toLowerCase().includes(q))return false;}
          if(rDateFrom&&j.created<rDateFrom)return false;
          if(rDateTo&&j.created>rDateTo)return false;
          return true;
        }).sort((a,b)=>new Date(b.completedAt||b.due)-new Date(a.completedAt||a.due));

        const exportCSV=()=>{
          const hdr=["ID","Title","Category","Priority","Status","Assignee","Location","Created","Due","Completed"];
          const rows=reportJobs.map(j=>[`JC-${String(j.id).padStart(4,"0")}`,`"${(j.title||"").replace(/"/g,'""')}"`,j.category,j.priority,j.status,j.assignee||"Unassigned",`"${(j.location||"").replace(/"/g,'""')}"`,j.created,j.due,j.completedAt?j.completedAt.slice(0,10):""].join(","));
          const csv=[hdr.join(","),...rows].join("\n");
          const a=document.createElement("a");
          a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
          a.download=`jobflow-report-${today()}.csv`;
          a.click();
        };

        const BarChart=({data,max,colorFn})=>(
          <div className="rpt-bar-wrap">
            {Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
              <div key={k} className="rpt-bar-row">
                <span className="rpt-bar-label" title={k}>{k}</span>
                <div className="rpt-bar-track" style={{opacity:1,background:"var(--card-border)"}}>
                  <div className="rpt-bar-fill" style={{width:`${(v/max)*100}%`,background:colorFn?colorFn(k):"var(--indigo)"}}/>
                </div>
                <span className="rpt-bar-count">{v}</span>
              </div>
            ))}
          </div>
        );

        return (
          <Page {...pg}>
            <TabNav/>
            {lightboxSrc&&<div className="photo-lightbox" onClick={()=>setLightboxSrc(null)}><img src={lightboxSrc} alt="Photo" onClick={e=>e.stopPropagation()}/><button onClick={()=>setLightboxSrc(null)} style={{position:"absolute",top:16,right:16,background:"none",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",cursor:"pointer",padding:"6px 14px",borderRadius:1,fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,letterSpacing:"0.08em"}}>× Close</button></div>}
            <div style={{marginBottom:36}}>
              <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.24em",color:"var(--text-dim)",marginBottom:10,fontWeight:300}}>ANALYTICS</div>
              <h2 style={{fontFamily:"'Noto Serif JP',serif",fontWeight:300,fontSize:28,color:"var(--text-pri)",letterSpacing:"0.04em"}}>Reports</h2>
              <BrushStroke variant={1} style={{marginTop:12}}/>
            </div>

            {/* Filters */}
            <div className="ws-card" style={{padding:"20px 24px",borderRadius:2,marginBottom:24}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <input className="ws-input" style={{flex:"1 1 160px",padding:"9px 12px"}} placeholder="Search…" value={rSrch} onChange={e=>setRSrch(e.target.value)}/>
                <CustomSelect value={rFPr} onChange={setRFPr} options={[{value:"All",label:"All Priority"},...PRIS.map(p=>({value:p,label:p}))]} style={{flex:"1 1 120px"}}/>
                <CustomSelect value={rFAss} onChange={setRFAss} options={[{value:"All",label:"All Assignees"},...assignees.map(a=>({value:a,label:a}))]} style={{flex:"1 1 140px"}}/>
                <CustomSelect value={rFCat} onChange={setRFCat} options={[{value:"All",label:"All Categories"},...cats.map(c=>({value:c,label:c}))]} style={{flex:"1 1 140px"}}/>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input type="date" className="ws-input" style={{flex:"1 1 140px",padding:"9px 12px"}} value={rDateFrom} onChange={e=>setRDateFrom(e.target.value)}/>
                <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,color:"var(--text-dim)",letterSpacing:"0.08em"}}>to</span>
                <input type="date" className="ws-input" style={{flex:"1 1 140px",padding:"9px 12px"}} value={rDateTo} onChange={e=>setRDateTo(e.target.value)}/>
                {(rFPr!=="All"||rFAss!=="All"||rFCat!=="All"||rSrch||rDateFrom||rDateTo)&&(
                  <button className="ws-btn-ghost" onClick={()=>{setRFPr("All");setRFAss("All");setRFCat("All");setRSrch("");setRDateFrom("");setRDateTo("");}} style={{fontSize:10,padding:"8px 14px"}}>× Clear</button>
                )}
              </div>
            </div>

            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.16em",color:"var(--text-sec)",textTransform:"uppercase"}}>{reportJobs.length} completed record{reportJobs.length!==1?"s":""}</span>
                <button className="ws-btn-ghost" onClick={exportCSV} style={{fontSize:10,padding:"7px 14px",letterSpacing:"0.1em"}}>↓ Export CSV</button>
              </div>
              {reportJobs.length===0&&<div style={{textAlign:"center",padding:"48px 20px"}}><InkBlot size={48} opacity={0.08} style={{margin:"0 auto 16px"}}/><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:15,color:"var(--text-dim)",fontWeight:300}}>No completed records match the filters</div></div>}
              <div className="ws-card" style={{borderRadius:2,overflow:"hidden"}}>
                {reportJobs.map((job,i)=>(
                  <HistRow key={job.id} job={job} total={reportJobs.length} idx={i} onPhotoClick={setLightboxSrc}/>
                ))}
              </div>
            </div>
          </Page>
        );
      }

      /* HOME */
      if(view==="home") return (
        <Page {...pg}>
          <CModal {...cm}/>
          <TabNav/>
          <div style={{marginBottom:48}}>
            <div style={{marginBottom:6}}>
              <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.24em",color:"var(--text-dim)",marginBottom:12,fontWeight:300}}>JOBCARD MANAGEMENT</div>
              <h1 style={{fontFamily:"'Noto Serif JP',serif",fontWeight:300,fontSize:36,color:"var(--text-pri)",letterSpacing:"0.04em",lineHeight:1.2}}>Work Orders<span style={{display:"block",fontSize:14,color:"var(--text-sec)",fontWeight:300,marginTop:6,letterSpacing:"0.12em",fontFamily:"'Noto Sans JP',sans-serif"}}>Record of Works</span></h1>
            </div>
            <BrushStroke variant={1} style={{marginTop:16}}/>
          </div>

          <div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:40}}>
            <StatTile label="Outstanding" count={cnts["Outstanding"]} color="var(--aka)"    onClick={()=>setFSt("Outstanding")}/>
            <StatTile label="In Progress" count={cnts["In Progress"]} color="var(--indigo)" onClick={()=>setFSt("In Progress")}/>
            <StatTile label="On Hold"     count={cnts["On Hold"]}     color="var(--ki)"     onClick={()=>setFSt("On Hold")}/>
          </div>

          <div style={{marginBottom:32}}>
            <input className="ws-input" style={{marginBottom:10,textAlign:"center"}} placeholder="Search…" value={srch} onChange={e=>setSrch(e.target.value)}/>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <CustomSelect value={fSt} onChange={setFSt} options={[{value:"All",label:"All Status"},...STATS.map(o=>({value:o,label:o}))]}/>
              <CustomSelect value={fPr} onChange={setFPr} options={[{value:"All",label:"All Priority"},...PRIS.map(p=>({value:p,label:p}))]}/>
              <CustomSelect value={sort} onChange={setSort} options={[{value:"due",label:"Due Date"},{value:"oldest",label:"Oldest"},{value:"created",label:"Newest"}]}/>
              {(fSt!=="All"||fPr!=="All"||srch)&&(
                <button className="ws-btn-ghost" onClick={()=>{setFSt("All");setFPr("All");setSrch("");}} style={{fontSize:10,padding:"8px 16px",letterSpacing:"0.12em"}}>× Clear Filters</button>
              )}
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.18em",color:"var(--text-sec)",fontWeight:500,textTransform:"uppercase"}}>{list.length} Work Order{list.length!==1?"s":""}{fSt!=="All"?` · ${fSt}`:""}</span>
              <button className="ws-btn-primary" onClick={openAdd} style={{fontSize:10,padding:"8px 16px",letterSpacing:"0.14em"}}>+ New Jobcard</button>
            </div>
            <BrushStroke variant={2}/>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {list.length===0&&(<div style={{textAlign:"center",padding:"64px 20px"}}><InkBlot size={56} opacity={0.08} style={{margin:"0 auto 20px"}}/><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:16,color:"var(--text-dim)",fontWeight:300,letterSpacing:"0.08em"}}>No records found</div></div>)}
            {list.map((job,i)=><JobRow key={job.id} job={job} delay={i*55} onClick={()=>{setSelId(job.id);setView("detail");}}/>)}
          </div>
        </Page>
      );

      /* DETAIL */
      if(view==="detail"&&selJob){
        const job=jobs.find(j=>j.id===selJob.id)||selJob;
        const sc=SC[job.status]; const ov=overdue(job.due,job.status);
        return (
          <Page {...pg}>
            <CModal {...cm}/>
            {delModal&&(
              <div style={{position:"fixed",inset:0,background:"var(--modal-bg)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900,backdropFilter:"blur(3px)"}}>
                <div className="ws-card anim-ink" style={{padding:40,maxWidth:380,width:"90%",textAlign:"center",borderRadius:2}}>
                  <InkBlot size={40} opacity={0.1} style={{margin:"0 auto 20px"}}/>
                  <div style={{fontFamily:"'Noto Serif JP',serif",fontSize:20,fontWeight:400,color:"var(--text-pri)",marginBottom:10,letterSpacing:"0.04em"}}>Delete this record?</div>
                  <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:12,color:"var(--text-sec)",lineHeight:1.7,marginBottom:28,fontWeight:300}}>"{job.title}"<br/>will be permanently removed.</div>
                  <BrushStroke variant={0} style={{marginBottom:24}}/>
                  <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                    <button className="ws-btn-ghost" onClick={()=>setDelModal(false)}>Cancel</button>
                    <button className="ws-btn-danger" onClick={doDelete}>Delete</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:36}}>
              <button className="ws-back" onClick={()=>setView("home")}>← Back</button>
              <div className="nav-actions" style={{display:"flex",alignItems:"center",gap:16}}>
                <button className="ws-btn-ghost" onClick={()=>openEdit(job)}>Edit</button>
                <button className="ws-btn-danger" onClick={()=>setDelModal(true)}>Delete</button>
              </div>
            </div>

            <div className="ws-card anim-ink" style={{padding:"36px 36px 32px",borderRadius:2,marginBottom:32,borderLeft:`3px solid ${sc.dot}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:16}}>
                <div>
                  <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.18em",color:"var(--text-dim)",marginBottom:10,fontWeight:300}}>JC-{String(job.id).padStart(4,"0")}</div>
                  <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:24,fontWeight:400,color:"var(--text-pri)",lineHeight:1.4,letterSpacing:"0.02em",maxWidth:480}}>{job.title}</h2>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                  <Pill status={job.status}/><Mon priority={job.priority}/>
                  {ov&&<span style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,color:"var(--aka)",letterSpacing:"0.1em"}}>⚠ Overdue</span>}
                </div>
              </div>
              {job.description&&(<><BrushStroke variant={0} style={{marginBottom:16}}/><p style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,fontWeight:300,color:"var(--text-sec)",lineHeight:1.9,marginBottom:24,paddingLeft:16,borderLeft:"1px solid var(--card-border)"}}>{job.description}</p></>)}
              <BrushStroke variant={2} style={{marginBottom:24}}/>
              <div className="detail-meta" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:24}}>
                {[...(job.invoiceNo?[{k:"Quote / Invoice No.",v:job.invoiceNo}]:[]),{k:"Category",v:job.category},{k:"Location",v:job.location},{k:"Assignee",v:job.assignee||"Unassigned"},{k:"Created",v:fmtDate(job.created)},{k:"Due Date",v:fmtDate(job.due)},...(job.scheduledTime?[{k:"Scheduled Time",v:job.scheduledTime}]:[])].map(({k,v})=>(
                  <div key={k}><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.14em",color:"var(--text-dim)",marginBottom:6,fontWeight:500,textTransform:"uppercase"}}>{k}</div><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400}}>{v}</div></div>
                ))}
              </div>
              {job.contact?.name&&(
                <>
                  <BrushStroke variant={1} style={{margin:"20px 0 16px"}}/>
                  <div>
                    <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.14em",color:"var(--text-dim)",marginBottom:8,fontWeight:500,textTransform:"uppercase"}}>Contact Person</div>
                    <div style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400,marginBottom:8}}>{job.contact.name}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {job.contact.phone&&<a href={`tel:${job.contact.phone}`} style={{display:"inline-flex",alignItems:"center",gap:6,fontFamily:"'Noto Sans JP',sans-serif",fontSize:12,color:"var(--indigo)",textDecoration:"none",letterSpacing:"0.04em"}}>📞 {job.contact.phone}</a>}
                      {job.contact.email&&<a href={`mailto:${job.contact.email}`} style={{display:"inline-flex",alignItems:"center",gap:6,fontFamily:"'Noto Sans JP',sans-serif",fontSize:12,color:"var(--indigo)",textDecoration:"none",letterSpacing:"0.04em"}}>✉ {job.contact.email}</a>}
                    </div>
                  </div>
                </>
              )}
            </div>

            {job.completionReport&&job.completionReport.templateType==="site-visit"&&(()=>{
              const r=job.completionReport;
              return (
                <div className="ws-card anim-ink" style={{padding:"28px 32px",borderRadius:2,marginBottom:32,borderLeft:"3px solid var(--matcha)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                    <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.18em",color:"var(--matcha)",textTransform:"uppercase",fontWeight:500}}>Site Visit Report</div>
                    <span style={{fontFamily:"'Noto Serif JP',serif",fontSize:13,color:"var(--matcha)",opacity:0.7}}>✓ Done</span>
                  </div>
                  <BrushStroke variant={0} style={{marginBottom:20}}/>
                  <div style={{display:"flex",flexDirection:"column",gap:20}}>
                    {r.arrivedAt&&<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:5}}>Arrived on site at</div><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:15,color:"var(--text-pri)",fontWeight:400}}>{r.arrivedAt}</div></div>}
                    {r.metWith&&<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:5}}>Met with</div><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400}}>{r.metWith}</div></div>}
                    {r.clientContact&&<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:5}}>Client Contact</div><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"var(--text-pri)",fontWeight:400}}>{r.clientContact}</div></div>}
                    {r.signatureDataUrl&&<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:8}}>Client Signature</div><img src={r.signatureDataUrl} alt="Signature" style={{height:56,maxWidth:"50%",objectFit:"contain",border:"1px solid var(--card-border)",borderRadius:2,background:"#f7f4ee",display:"block"}}/></div>}
                    {r.workCompleted&&r.workCompleted.length>0&&(<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:8}}>Work Completed</div><ul style={{listStyle:"none",padding:0,display:"flex",flexDirection:"column",gap:5}}>{r.workCompleted.map((it,i)=><li key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:"var(--matcha)",flexShrink:0,fontSize:15,lineHeight:1.5}}>•</span><span style={{fontFamily:"'Noto Serif JP',serif",fontSize:13,color:"var(--text-pri)",fontWeight:300,lineHeight:1.7}}>{it}</span></li>)}</ul></div>)}
                    {r.workRemaining&&r.workRemaining.length>0&&(<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:8}}>Work Remaining</div><ul style={{listStyle:"none",padding:0,display:"flex",flexDirection:"column",gap:5}}>{r.workRemaining.map((it,i)=><li key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:"var(--ki)",flexShrink:0,fontSize:15,lineHeight:1.5}}>•</span><span style={{fontFamily:"'Noto Serif JP',serif",fontSize:13,color:"var(--text-pri)",fontWeight:300,lineHeight:1.7}}>{it}</span></li>)}</ul></div>)}
                    {r.additionalNotes&&(<div><div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:9,letterSpacing:"0.16em",color:"var(--text-dim)",fontWeight:500,textTransform:"uppercase",marginBottom:5}}>Additional Notes</div><p style={{fontFamily:"'Noto Serif JP',serif",fontSize:13,color:"var(--text-pri)",fontWeight:300,lineHeight:1.8,margin:0}}>{r.additionalNotes}</p></div>)}
                  </div>
                  <BrushStroke variant={2} style={{margin:"20px 0 16px"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,color:"var(--matcha)"}}>✓</span><span style={{fontFamily:"'Noto Serif JP',serif",fontSize:12,color:"var(--matcha)",letterSpacing:"0.06em"}}>Jobcard complete</span></div>
                </div>
              );
            })()}

            <SL s={1}>Update Status</SL>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {STATS.filter(st=>st!==job.status).map(st=>{const c=SC[st];return(
                <button key={st} onClick={()=>changeStatus(job,st)} style={{background:"transparent",color:c.color,border:`1px solid ${c.border}`,padding:"9px 18px",fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,letterSpacing:"0.08em",cursor:"pointer",borderRadius:1,transition:"all 0.2s",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:5,height:5,borderRadius:"50%",background:c.dot,display:"inline-block"}}/>{st}
                </button>
              );})}
            </div>
          </Page>
        );
      }

      /* FORM */
      if(view==="form") return (
        <Page {...pg}>
          <CModal {...cm}/>
          <div style={{marginBottom:36}}>
            <button className="ws-back" onClick={()=>{if(edit)setView("detail");else if(formOrigin==="calendar"){setTab("calendar");setView("home");}else setView("home");}}>← Back</button>
          </div>
          <div style={{marginBottom:36}}>
            <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:10,letterSpacing:"0.22em",color:"var(--text-dim)",marginBottom:10,fontWeight:300}}>{edit?"EDIT":"CREATE"}</div>
            <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:28,fontWeight:300,color:"var(--text-pri)",letterSpacing:"0.04em"}}>{edit?"Edit Work Order":"New Work Order"}<span style={{display:"block",fontSize:13,color:"var(--text-sec)",fontWeight:300,marginTop:6,fontFamily:"'Noto Sans JP',sans-serif",letterSpacing:"0.1em"}}>{edit?"Update jobcard details":"Open a new work order"}</span></h2>
            <BrushStroke variant={0} style={{marginTop:14}}/>
          </div>
          <div className="ws-card" style={{padding:"32px 32px 28px",borderRadius:2,marginBottom:8}}>
            <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginBottom:24}}>
              <FG label="Quote / Invoice No." full><input className="ws-input" placeholder="e.g. INV-0042 or QT-2026-001…" value={form.invoiceNo||""} onChange={e=>sf("invoiceNo",e.target.value)}/></FG>
              <FG label="Job Title" error={errs.title} full><input className="ws-input" placeholder="Describe the task…" value={form.title||""} onChange={e=>sf("title",e.target.value)} style={{borderColor:errs.title?"var(--aka)":undefined}}/></FG>
              <FG label="Category"><EditableSelect value={form.category||cats[0]||""} onChange={v=>sf("category",v)} items={cats} onItemsChange={setCats}/></FG>
              <FG label="Priority"><CustomSelect value={form.priority||"Medium"} onChange={v=>sf("priority",v)} options={PRIS}/></FG>
              {edit&&<FG label="Status"><CustomSelect value={form.status||"Outstanding"} onChange={v=>sf("status",v)} options={STATS}/></FG>}
              <FG label="Assignee" error={errs.assignee}><CustomSelect value={form.assignee||assignees[0]||""} onChange={v=>sf("assignee",v)} options={assignees.map(a=>({value:a,label:a}))}/></FG>
              <FG label="Location" error={errs.location}><EditableSelect value={form.location||""} onChange={v=>sf("location",v)} items={locations} onItemsChange={setLocations} placeholder="Select or add location…"/></FG>
              <FG label="Due Date" error={errs.due}><DatePicker value={form.due||""} onChange={v=>sf("due",v)} hasError={!!errs.due}/></FG>
              <FG label="Scheduled Time"><ClockPicker value={form.scheduledTime||"09:00"} onChange={v=>sf("scheduledTime",v)}/></FG>
              <FG label="Contact Person" full><ContactSelect value={form.contact||{}} onChange={v=>sf("contact",v)} contacts={contacts} onContactsChange={setContacts} placeholder="Select or add contact…"/></FG>
              <FG label="Report Recipient Email" full><input type="email" className="ws-input" placeholder="Send completion report to…" value={form.recipientEmail||""} onChange={e=>sf("recipientEmail",e.target.value)}/></FG>
              <FG label="Notes" full><textarea className="ws-input" style={{minHeight:90,resize:"vertical"}} placeholder="Context, hazards, special instructions…" value={form.description||""} onChange={e=>sf("description",e.target.value)}/></FG>
            </div>
            <BrushStroke variant={2} style={{marginBottom:24}}/>
            <div style={{display:"flex",justifyContent:"flex-end",gap:12}}>
              <button className="ws-btn-ghost" onClick={()=>{if(edit)setView("detail");else if(formOrigin==="calendar"){setTab("calendar");setView("home");}else setView("home");}}>Cancel</button>
              <button className="ws-btn-primary" onClick={submitForm}>{edit?"Save":"Create"}</button>
            </div>
          </div>
        </Page>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
